{% extends "base.html" %}
{% block content %}
<style>
.container { padding-top: 10px !important; padding-bottom: 10px !important; margin-top: 5px !important; }
#filtros-perfiles { display: flex; flex-wrap: wrap; gap: 6px; }
.filtro-group label.bl { display: block; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>

<div class="header-actions" style="display:flex;justify-content:space-between;align-items:center;margin:0 auto 10px;max-width:1450px;width:100%;flex-wrap:wrap;gap:10px;">
    <div style="display:flex;gap:15px;align-items:center;">
        <a href="{{ url_for('dashboard') }}" style="display:inline-flex;align-items:center;gap:5px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;padding:6px 12px;border-radius:6px;text-decoration:none;font-weight:600;font-size:13px;">
            <i class="ph ph-arrow-left"></i> Volver
        </a>
        <div>
            <h1 style="margin:0;padding:0;border:none;font-size:22px;">📍 Ubicación de Unidades</h1>
            <p id="info-actualizacion" style="margin:4px 0 0;font-size:12px;color:#94a3b8;"></p>
        </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <span id="contador-unidades" style="font-size:13px;font-weight:600;color:#1e6fbf;background:#eff6ff;padding:6px 14px;border-radius:20px;"></span>
        <span id="status-conexion"></span>
        <button id="btn-actualizar" class="btn-primary" style="padding:7px 14px;font-size:13px;">
            <i class="ph ph-arrows-clockwise"></i> Actualizar
        </button>
    </div>
</div>

<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;margin:0 auto 10px;max-width:1450px;width:100%;display:flex;flex-wrap:wrap;align-items:center;gap:14px;">
    <div class="filtro-group">
        <label class="bl">Perfiles</label>
        <div id="filtros-perfiles"></div>
    </div>
    <div class="filtro-group">
        <label class="bl">Actividad</label>
        <select id="filtro-tiempo" style="font-size:12px;padding:4px 10px;border-radius:20px;border:1.5px solid #cbd5e1;background:white;font-family:inherit;">
            <option value="0">Todas</option>
            <option value="5">Últimos 5 min</option>
            <option value="15">Últimos 15 min</option>
            <option value="30">Últimos 30 min</option>
            <option value="60">Última hora</option>
        </select>
    </div>
    <div class="filtro-group">
        <label class="bl">Buscar</label>
        <input type="text" id="filtro-busqueda" placeholder="Nombre o ID…" style="font-size:12px;padding:4px 10px;border-radius:20px;border:1.5px solid #cbd5e1;background:white;font-family:inherit;width:150px;">
    </div>
    <div class="filtro-group" style="margin-left:auto;">
        <label class="bl">Zoom</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#64748b;cursor:pointer;">
            <input type="checkbox" id="desactivar-zoom-auto" style="width:auto;height:auto;"> Bloquear
        </label>
    </div>
</div>

<div style="width:100%;max-width:1450px;margin:0 auto;">
    <div id="map" style="height:75vh;width:100%;border-radius:12px;z-index:1;box-shadow:0 4px 15px rgba(0,0,0,0.05);border:1px solid #e2e8f0;"></div>
</div>

<script src="{{ url_for('static', filename='mapa.js') }}"></script>
{% endblock %}
