{% extends "base.html" %}
{% block title %}Subir Documento al Archivador{% endblock %}
{% block content %}

<div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px; padding-bottom:14px; border-bottom:2px solid #dbeafe;">
    <div style="display:flex; align-items:center; gap:15px;">
        <a href="{{ url_for('archivador_list') }}" style="display:inline-flex; align-items:center; gap:5px; background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; padding:6px 12px; border-radius:6px; text-decoration:none; font-weight:600; font-size:13px;">
            ← Volver
        </a>
        <h1 style="margin:0; padding:0; border:none; font-size:20px;">⬆️ Subir Documento</h1>
    </div>
</div>

<div style="max-width: 600px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;">
    <form method="POST" action="{{ url_for('archivador_nuevo') }}" enctype="multipart/form-data">
        <div style="margin-bottom: 20px;">
            <label for="nombre_formulario_select" style="display: block; font-weight: 600; color: #1e3a5f; margin-bottom: 8px; font-size: 14px;">
                Nombre del Formulario <span style="color: #ef4444;">*</span>
            </label>
            <p style="font-size: 12px; color: #64748b; margin-top: 0; margin-bottom: 8px;">
                Seleccione el nombre del formulario para asignarle un consecutivo, o elija "Otro..." para crear uno nuevo.
            </p>
            
            <select id="nombre_formulario_select" name="nombre_formulario_select" required
                   style="width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; background-color: white;"
                   onchange="checkOtroFormulario(this.value)">
                <option value="" disabled selected>-- Seleccione un formulario --</option>
                {% for nombre in nombres_formulario %}
                <option value="{{ nombre }}">{{ nombre }}</option>
                {% endfor %}
                <option value="OTRO" style="font-weight: 700; color: #10b981;">+ Otro nuevo formulario...</option>
            </select>
            
            <div id="custom_nombre_container" style="display: none; margin-top: 10px;">
                <input type="text" id="nombre_formulario_custom" name="nombre_formulario_custom" 
                       placeholder="Escriba el nombre del nuevo formulario"
                       style="width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
            </div>
            
            <script>
                function checkOtroFormulario(value) {
                    var customContainer = document.getElementById('custom_nombre_container');
                    var customInput = document.getElementById('nombre_formulario_custom');
                    if (value === 'OTRO') {
                        customContainer.style.display = 'block';
                        customInput.required = true;
                        customInput.focus();
                    } else {
                        customContainer.style.display = 'none';
                        customInput.required = false;
                        customInput.value = '';
                    }
                }
            </script>
        </div>
        
        <div style="margin-bottom: 24px;">
            <label for="archivo" style="display: block; font-weight: 600; color: #1e3a5f; margin-bottom: 8px; font-size: 14px;">
                Seleccionar Archivo <span style="color: #ef4444;">*</span>
            </label>
            <div style="border: 2px dashed #cbd5e1; border-radius: 8px; padding: 20px; text-align: center; background: #f8fafc;">
                <input type="file" id="archivo" name="archivo" required
                       style="font-size: 14px; width: 100%; color: #475569;">
            </div>
        </div>
        
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <a href="{{ url_for('archivador_list') }}" style="background: white; border: 1.5px solid #cbd5e1; color: #475569; padding: 10px 20px; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 14px;">
                Cancelar
            </a>
            <button type="submit" style="background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);">
                Subir y Asignar Consecutivo
            </button>
        </div>
    </form>
</div>

{% endblock %}
