{% extends 'base.html' %}
{% block content %}
<div style="margin-bottom: 24px;">
    <a href="{{ url_for('archivador_list') }}" style="display: inline-flex; align-items: center; gap: 6px; color: #64748b; text-decoration: none; font-weight: 600; font-size: 13px; margin-bottom: 12px; transition: color 0.2s;" onmouseover="this.style.color='#1e3a8a'" onmouseout="this.style.color='#64748b'">
        ← Volver al Archivador
    </a>
    <h2 style="color: #1e3a8a; font-weight: 800; font-size: 22px; margin: 0; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 24px; line-height: 1; color: #1e6fbf;">☁</span>
        Subir Nuevo Documento
    </h2>
</div>

<form action="{{ url_for('archivador_nuevo') }}" method="POST" enctype="multipart/form-data" style="max-width: 600px;">
    <fieldset>
        <legend>Datos del Formulario</legend>

        <label for="nombre_formulario_select">Nombre o Tipo del Formulario</label>
        <select id="nombre_formulario_select" name="nombre_formulario_select" required onchange="toggleOtro()">
            <option value="" disabled selected>-- Selecciona un formulario --</option>
            {% for frm in nombres_formulario %}
                <option value="{{ frm }}">{{ frm }}</option>
            {% endfor %}
            <option value="Otro">Otro (Escribir nombre)</option>
        </select>

        <div id="otro_nombre_div" style="display: none;">
            <label for="nombre_formulario_otro">Escribe el nombre del formulario</label>
            <input type="text" id="nombre_formulario_otro" name="nombre_formulario_otro" placeholder="Ej: Consentimiento Informado">
        </div>
        
        <script>
        function toggleOtro() {
            var select = document.getElementById("nombre_formulario_select");
            var div = document.getElementById("otro_nombre_div");
            var input = document.getElementById("nombre_formulario_otro");
            
            if (select.value === "Otro") {
                div.style.display = "block";
                input.required = true;
            } else {
                div.style.display = "none";
                input.required = false;
            }
        }
        </script>
        
        <label for="archivo">Archivo del Formulario (Escaneado o PDF)</label>
        <div style="margin-top: 5px; border: 1.5px solid #cbd5e1; border-radius: 8px; padding: 12px; background: white; display: flex; align-items: center;">
            <input type="file" id="archivo" name="archivo" required style="border: none; padding: 0; margin: 0; box-shadow: none;">
        </div>
    </fieldset>

    <div style="margin-top: 24px;">
        <button type="submit" style="background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 700; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(16,185,129,0.2);" onmouseover="this.style.background='#059669'; this.style.transform='translateY(-1px)'" onmouseout="this.style.background='#10b981'; this.style.transform='none'">
            ☁ Subir y Guardar
        </button>
    </div>
</form>
{% endblock %}
