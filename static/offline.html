<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — Ambulacia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f6ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(30,111,191,0.12);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { color: #1e3a8a; font-size: 22px; margin-bottom: 10px; }
    p  { color: #64748b; font-size: 14px; line-height: 1.7; margin-bottom: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #1e6fbf, #185999);
      color: white; border: none; border-radius: 10px;
      padding: 13px 28px; font-size: 15px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 4px 12px rgba(30,111,191,0.3);
      transition: transform 0.12s;
    }
    .btn:hover { transform: translateY(-1px); }
    .badge {
      display: inline-block; margin-top: 20px;
      background: #fef3c7; color: #92400e;
      border: 1px solid #fde68a; border-radius: 8px;
      padding: 8px 16px; font-size: 12px; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión a internet</h1>
    <p>
      Esta sección requiere conexión.<br>
      Para registrar historias clínicas <strong>sin internet</strong>,
      usa el formulario offline desde el menú principal de la app.
    </p>
    <a href="/formulario" class="btn">
      📋 Ir al formulario offline
    </a>
    <div class="badge">
      💾 Los registros offline se sincronizarán automáticamente cuando vuelva el internet
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const btn = document.querySelector('.btn');
      // Si la URL actual tiene parámetros de búsqueda (ej. ?atencion_colectiva_id=X)
      // y estamos intentando ir a un formulario, los preservamos.
      if (btn && window.location.search && window.location.pathname.includes('formulario')) {
        btn.href = "/formulario" + window.location.search;
      }
    });
  </script>
</body>
</html>
